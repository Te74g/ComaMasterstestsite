<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン | ComaMasters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../assets/css/common.css?v=2">
  <link rel="stylesheet" href="../assets/css/auth.css?v=1">
</head>
<body id="login" data-page="login" data-rt="../">

  <div class="site-shell">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-logo" href="../" aria-label="ComaMasters Home">ComaMasters</a>
        <nav class="site-nav" id="siteNav" aria-label="Global Navigation">
          <a class="site-nav__link" href="../" data-nav="top">TOP</a>
          <a class="site-nav__link" href="../ranking/" data-nav="ranking">RANKING</a>
          <a class="site-nav__link" href="../event/" data-nav="event">EVENT</a>
          <a class="site-nav__link" href="../results/" data-nav="results">RESULTS</a>
          <a class="site-nav__link" href="../links/" data-nav="links">LINKS</a>
        </nav>
        <button class="site-menu-button" id="siteMenuButton" type="button" aria-expanded="false" aria-controls="siteNav">MENU</button>
      </div>
    </header>

    <main class="auth-page">
      <div class="auth-box">
        <a class="auth-box__logo" href="../">ComaMasters</a>
        <h1 class="auth-box__title">ログイン</h1>
        <p class="auth-box__sub">アカウントにサインインしてください</p>

        <p class="auth-error" id="authError" role="alert"></p>

        <form class="auth-form" id="loginForm" novalidate>
          <div class="auth-field">
            <label class="auth-label" for="loginEmail">メールアドレス</label>
            <input class="auth-input" id="loginEmail" type="email"
                   placeholder="example@email.com" autocomplete="email" required>
          </div>
          <div class="auth-field">
            <label class="auth-label" for="loginPassword">パスワード</label>
            <input class="auth-input" id="loginPassword" type="password"
                   placeholder="••••••••" autocomplete="current-password" required>
          </div>
          <button class="auth-submit" id="loginSubmit" type="submit">ログイン</button>
        </form>

        <div class="auth-divider">または</div>

        <div class="auth-social">
          <button class="auth-social-btn" id="googleLoginBtn" type="button">
            <svg class="auth-social-btn__icon" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google でログイン
          </button>
        </div>

        <div class="auth-footer">
          アカウントをお持ちでない方は
          <a href="../register/">新規登録</a>
        </div>
      </div>
    </main>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/incparts.js?v=2"></script>
  <script src="../assets/js/jquery.common.js?v=2"></script>
  <script>
  (function () {
    "use strict";

    // ログイン済みならマイページへ
    CMA.redirectIfLoggedIn("../");

    const form      = document.getElementById("loginForm");
    const emailEl   = document.getElementById("loginEmail");
    const passEl    = document.getElementById("loginPassword");
    const submitBtn = document.getElementById("loginSubmit");
    const errorEl   = document.getElementById("authError");

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add("is-show");
    }
    function clearError() {
      errorEl.classList.remove("is-show");
    }

    // メール＆パスワード
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      clearError();
      submitBtn.disabled = true;
      submitBtn.textContent = "ログイン中…";

      CMA.loginWithEmail(emailEl.value.trim(), passEl.value, function (err) {
        showError(CMA.errorMessage(err.code));
        submitBtn.disabled = false;
        submitBtn.textContent = "ログイン";
      }).then(function (cred) {
        if (cred) window.location.href = "../mypage/";
      });
    });

    // Google
    document.getElementById("googleLoginBtn").addEventListener("click", function () {
      clearError();
      CMA.loginWithGoogle(function (err) {
        if (err.code !== "auth/popup-closed-by-user") {
          showError(CMA.errorMessage(err.code));
        }
      }).then(function (cred) {
        if (cred) window.location.href = "../mypage/";
      });
    });

  }());
  </script>
</body>
</html>
